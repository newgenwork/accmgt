<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ledger Important Dates</title>

    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <div th:replace="fragments/header :: header"></div>


    </div>
</nav>

<nav class="navbar navbar-light bg-light">
    <div class="container">
        <h4 class="navbar-brand mb-0">
            Expiring Documents
        </h4>
    </div>
</nav>

<div class="container mt-4">


    <!-- ================= LIST ================= -->




    <table class="table table-bordered table-hover mt-4">
        <thead class="thead-light">
        <tr>
            <th>Name</th>

            <th>Created Date</th>

            <th>Expiry Date</th>
            <th>Description</th>

            <th>Type</th>
            <th>Document Link</th>
            <th style="width: 220px;">Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="d : ${documents}">


            <td th:text="${d.ledger.ledgerName}"></td>
            <td th:text="${#temporals.format(d.createdDate, 'MM-dd-yyyy')}"></td>
            <td th:text="${#temporals.format(d.expiryDate, 'MM-dd-yyyy')}"></td>
            <td th:text="${d.description}"></td>
            <td th:text="${d.type}"></td>
            <td th:text="${d.documentLink}"></td>
            <td class="text-center">

                <!-- DOWNLOAD -->
                <table>
                    <tr>
                    <td>




                        <form th:if="${d.isHasFile()}"
                              th:action="@{/api/v1/ledger/documents/download/{id}(id=${d.id})}"
                              method="GET"
                              style="displaymeterName}"
                              th:value="${_csrf.token}" />

                        <!--button type="submit"
                                class="btn btn-sm btn-success">
                            Download
                        </button-->


                        <button type="submit"
                                class="btn btn-sm"
                                th:classappend="${d.hasFile} ? 'btn-success' : 'btn-secondary'"
                                th:text="${d.hasFile} ? 'Download' : 'No File'"
                                th:disabled="${!d.hasFile}">
                        </button>






                        </form>
                    </td>
                    <td>

                        <form th:action="@{/api/v1/ledger/{lId}/documents/delete/{dId} (lId=${d.ledger.id}, dId=${d.id})}" method="post">
                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}" />



                            <button type="submit"
                                    class="btn btn-sm btn-danger"
                                    onclick="return confirm('Remove this important date?')">
                                Remove
                            </button>

                        </form>

                    </td>
                    </tr>
                </table>






            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(documents)}">
            <td colspan="4" class="text-center text-muted">
                No documents uploaded.
            </td>
        </tr>

        </tbody>
    </table>
</div>

</body>
</html>
