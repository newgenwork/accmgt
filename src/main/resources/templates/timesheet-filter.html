<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Home Page</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
        integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">


  <script>
    function loadEmployees() {

      const vendorId = document.getElementById("vendorId").value;
      const empSelect = document.getElementById("employeeIds");

      // clear existing
      empSelect.innerHTML = "";

      if (!vendorId) {
        return;
      }

      fetch("/api/v1/timesheet/vendors/" + vendorId + "/employees")
              .then(res => res.json())
              .then(employees => {
                employees.forEach(emp => {
                  const option = document.createElement("option");
                  option.value = emp.id;            // Ledger.id
                  option.text  = emp.ledgerName;   // Ledger.ledgerName
                  empSelect.appendChild(option);
                });
              })
              .catch(err => console.error(err));
    }
  </script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container">
    <div th:replace="fragments/header :: header"></div>
  </div>
</nav>




<div class="container">
  <div class="row  justify-content-center">
    <div class="col-md-6 col-md-offset-3">

      <h1>Timesheet Filter</h1>

      <!--Successful Registration-->
      <div th:if="${param.success}">
        <div class="alert alert-info">
          Operation completed successfully!
          <span th:text="${param.success}"></span>
        </div>
      </div>


      <div th:if="${param.error}">
        <div class="alert alert-danger">
          <span th:text="${param.error}"></span>
        </div>
      </div>


        <form action="/api/v1/timesheet/filter"  th:object="${timesheetFilter}" method="get">

        <div class="form-group">
          <label for="vendorId">Vendor</label>
          <select id="vendorId"
                  th:field="*{clientId}"
                  class="form-control"
                  onchange="loadEmployees()"
          >
            <option value="" >
              -- Select Vendor --
            </option>


            <option th:each="c : ${clients}"
                    th:value="${c.id}"
                    th:text="${c.ledgerName}">
            </option>
          </select>
        </div>
          <div class="form-group">

          <label for="employeeIds">Employees</label>
          <select id="employeeIds"
                  name="employeeIds"
                  class="form-control"
                  multiple
                  size="6">
          </select>
    </div>

          <div class="form-group">
          <label class="control-label" for="startDate">
            Start Date
          </label>
          <input id="startDate" type="date" class="form-control" th:field="*{startDate}"
                 autofocus="autofocus"  >
        </div>
        <div class="form-group">
          <label class="control-label" for="endDate">
            End Date
          </label>
          <input id="endDate" type="date" class="form-control" th:field="*{endDate}"  autofocus="autofocus" >
        </div>





        <div class="form-group">
          <button type="submit" class="btn btn-success">Submit</button>
        </div>
      </form>
    </div>
  </div>
</div>



</body>

``
</html>
