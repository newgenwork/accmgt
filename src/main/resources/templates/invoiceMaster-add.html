<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Invoice</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
          integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <div th:replace="fragments/header :: header"></div>


    </div>
</nav>


<h2>Add Invoice</h2>

<form th:action="@{/api/v1/invoicesMaster/add}"
      th:object="${invoiceMaster}" method="post">

    <!-- ================= Invoice Header ================= -->
    <fieldset>


        <div class="card mb-4">
            <div class="card-header font-weight-bold">
                Invoice Header
            </div>

            <div class="card-body">

                <div class="form-row">
                    <!-- Reference -->
                    <div class="form-group col-md-4">
                        <label for="reference">Reference</label>
                        <input type="text"
                               id="reference"
                               th:field="*{reference}"
                               class="form-control"
                               required />
                    </div>

                    <!-- Invoice Date -->
                    <div class="form-group col-md-4">
                        <label for="invoiceDate">Invoice Date</label>
                        <input type="date"
                               id="invoiceDate"
                               th:field="*{invoiceDate}"
                               class="form-control"
                               required />
                    </div>

                    <!-- Client -->
                    <div class="form-group col-md-4">
                        <label for="client">Client</label>
                        <select id="client"
                                th:field="*{client}"
                                class="form-control">
                            <option value="">-- Select Client --</option>
                            <option th:each="c : ${clients}"
                                    th:value="${c.id}"
                                    th:text="${c.ledgerName}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <!-- Payment Received Date (SUBMITTED) -->
                    <div class="form-group col-md-4"
                         th:if="*{status == 'SUBMITTED'}">
                        <label>Payment Received Date</label>
                        <input type="date"
                               th:field="*{receivedDate}"
                               class="form-control" />
                    </div>

                    <!-- Payment Received Date (PAID) -->
                    <div class="form-group col-md-4"
                         th:if="*{status == 'PAID'}">
                        <label>Payment Received Date</label>
                        <input type="text"
                               th:field="*{receivedDate}"
                               class="form-control"
                               readonly />
                    </div>

                    <!-- Status -->
                    <div class="form-group col-md-4">
                        <label>Status</label>
                        <input type="text"
                               th:field="*{status}"
                               class="form-control"
                               readonly />
                    </div>
                </div>

            </div>
        </div>
    </fieldset>

    <br/>

    <!-- ================= Invoice Lines ================= -->
    <fieldset>

        <div class="card mb-4">
            <div class="card-header font-weight-bold">
                Invoice Lines
            </div>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-bordered table-striped mb-0">
                        <thead class="thead-light">
                        <tr>
                            <th>Employee</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th class="text-right">Hours</th>
                            <th class="text-right">Invoice Rate</th>
                            <th class="text-right">Amount</th>
                            <th class="text-center" style="width: 50px;">Action</th>
                        </tr>
                        </thead>

                        <tbody id="lineItems">
                        <tr th:each="detail, iter : *{details}">
                            <!-- Employee -->
                            <td>
                                <select th:field="*{details[__${iter.index}__].employee}"
                                        class="form-control"
                                        onchange="onEmployeeChange(this)"
                                        required>
                                    <option value="">-- Select Employee --</option>
                                    <option th:each="e : ${employees}"
                                            th:value="${e.id}"
                                            th:data-rate="${e.invoiceRate}"
                                            th:text="${e.ledgerName}">
                                    </option>
                                </select>
                            </td>

                            <!-- Start Date -->
                            <td>
                                <input type="date"
                                       th:field="*{details[__${iter.index}__].startDate}"
                                       class="form-control"
                                       required />
                            </td>

                            <!-- End Date -->
                            <td>
                                <input type="date"
                                       th:field="*{details[__${iter.index}__].endDate}"
                                       class="form-control"
                                       required />
                            </td>

                            <!-- Hours -->
                            <td>
                                <input type="number"
                                       th:field="*{details[__${iter.index}__].noOfHrs}"
                                       oninput="calcAmount(this)"
                                       class="form-control text-right"
                                       required />
                            </td>

                            <!-- Invoice Rate -->
                            <td>
                                <input type="number"
                                       step="0.01"
                                       th:field="*{details[__${iter.index}__].rate}"
                                       class="form-control text-right"
                                       readonly />
                            </td>

                            <!-- Amount -->
                            <td>
                                <input type="number"
                                       step="0.01"
                                       th:field="*{details[__${iter.index}__].amount}"
                                       class="form-control text-right"
                                       readonly />
                            </td>

                            <!-- Remove -->
                            <td class="text-center">
                                <button type="button"
                                        class="btn btn-sm btn-danger"
                                        onclick="removeRow(this)">
                                    ✕
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <button type="button" onclick="addRow()">+ Add Line</button>
    </fieldset>

    <br/>
    <tfoot>
    <tr>
        <td colspan="5" style="text-align:right;"><strong>Total Amount:</strong></td>
        <td>
            <input type="number"
                   id="totalAmount"
                   class="form-control"
                   step="0.01"
                   readonly/>
        </td>
        <td></td>
    </tr>
    </tfoot>


    <div class="mt-3">

        <!-- ================= DRAFT ================= -->
        <div th:if="*{status == 'DRAFT'}">
            <button type="submit"
                    name="action"
                    value="save"
                    class="btn btn-primary">
                Save Invoice
            </button>

            <button type="submit"
                    name="action"
                    value="submit"
                    class="btn btn-success">
                Submit Invoice
            </button>
        </div>

        <!-- ================= SUBMITTED ================= -->
        <div th:if="*{status == 'SUBMITTED'}">
            <button type="submit"
                    name="action"
                    value="receivePayment"
                    class="btn btn-warning">
                Received Payment
            </button>
        </div>

        <!-- ================= PAID / RECEIVED ================= -->
        <div th:if="*{status == 'PAID'}">
        <span class="badge badge-success">
            Payment Received
        </span>
        </div>

    </div>



</form>

<!-- ================= Employee Options Template ================= -->
<select id="employeeOptionsTemplate" style="display:none">
    <option value="">-- Select Employee --</option>
    <option th:each="e : ${employees}"
            th:value="${e.id}"
            th:data-rate="${e.invoiceRate}"
            th:text="${e.ledgerName}">
    </option>
</select>

<!-- ================= JavaScript ================= -->
<script>

    document.addEventListener("DOMContentLoaded", function () {
        // ✅ Recalculate amount for each existing row (edit mode)
        document.querySelectorAll("#lineItems tr").forEach(row => {
            const hrsInput = row.querySelector('input[name$=".noOfHrs"]');
            if (hrsInput) {
                calcAmount(hrsInput);
            }
        });

        // ✅ Ensure total is calculated on load
        updateTotal();
    });

    let rowIndex = 1;

    function addRow() {
        const tbody = document.getElementById("lineItems");

        // ✅ Always calculate the next index dynamically
        const index = tbody.querySelectorAll("tr").length;

        const row = document.createElement("tr");

        const employeeOptions =
            document.getElementById("employeeOptionsTemplate").innerHTML;

        row.innerHTML = `
        <td>
            <select name="details[${index}].employee"
                    onchange="onEmployeeChange(this)"
                    required>
                ${employeeOptions}
            </select>
        </td>
        <td>
            <input type="date"
                   name="details[${index}].startDate"
                   required/>
        </td>
        <td>
            <input type="date"
                   name="details[${index}].endDate"
                   required/>
        </td>
        <td>
            <input type="number"
                   name="details[${index}].noOfHrs"
                   oninput="calcAmount(this)"
                   required/>
        </td>
        <td>
            <input type="number"
                   step="0.01"
                   name="details[${index}].rate"
                   readonly/>
        </td>
        <td>
            <input type="number"
                   step="0.01"
                   name="details[${index}].amount"
                   readonly/>
        </td>
        <td>
            <button type="button"
                    onclick="removeRow(this)">
                X
            </button>
        </td>
    `;

        tbody.appendChild(row);
    }

    function removeRow(btn) {
        btn.closest("tr").remove();
    }

    function onEmployeeChange(select) {
        const row = select.closest("tr");
        const option = select.options[select.selectedIndex];
        const rate = option.dataset.rate || 0;

        row.querySelector('input[name$=".rate"]').value = rate;
        calcAmount(select);
    }

    function calcAmount(elem) {
        const row = elem.closest("tr");
        const hrs =
            parseFloat(row.querySelector('input[name$=".noOfHrs"]').value) || 0;
        const rate =
            parseFloat(row.querySelector('input[name$=".rate"]').value) || 0;

        row.querySelector('input[name$=".amount"]').value =
            (hrs * rate).toFixed(2);

        updateTotal();
    }

    function updateTotal() {
        let total = 0;
        document
            .querySelectorAll('input[name$=".amount"]')
            .forEach(input => {
                total += parseFloat(input.value) || 0;
            });

        document.getElementById("totalAmount").value =
            total.toFixed(2);
    }

</script>



</body>
</html>
