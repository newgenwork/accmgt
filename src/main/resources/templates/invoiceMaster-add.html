<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Invoice</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
          integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <div th:replace="fragments/header :: header"></div>


    </div>
</nav>


<h2>Add Invoice</h2>

<form th:action="@{/api/v1/invoicesMaster/add}"
      th:object="${invoiceMaster}" method="post">

    <!-- ================= Invoice Header ================= -->
    <fieldset>
        <legend>Invoice Header</legend>

        <label>Reference:</label>
        <input type="text" th:field="*{reference}" required/>
        <br/><br/>

        <label>Invoice Date:</label>
        <input type="date" th:field="*{invoiceDate}" required/>
        <br/><br/>

        <label>Client:</label>

        <select id="client"  th:field="*{client}" >
            <option value="">-- Select Client --</option>

            <option
                    th:each="c : ${clients}"
                    th:value="${c.id}"
                    th:text="${c.ledgerName}">
            </option>
        </select>

        <input type="hidden" th:field="*{status}" value="DRAFT"/>
    </fieldset>

    <br/>

    <!-- ================= Invoice Lines ================= -->
    <fieldset>
        <legend>Invoice Lines</legend>

        <table>
            <thead>
            <tr>
                <th>Employee</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Hours</th>
                <th>Invoice Rate</th>
                <th>Amount</th>
                <th></th>
            </tr>
            </thead>

            <tbody id="lineItems">
            <tr th:each="detail, iter : *{details}">
            <td>
                    <select th:field="*{details[__${iter.index}__].employee}"
                            onchange="onEmployeeChange(this)"
                            required>
                        <option value="">-- Select Employee --</option>
                        <option th:each="e : ${employees}"
                                th:value="${e.id}"
                                th:data-rate="${e.invoiceRate}"
                                th:text="${e.ledgerName}">
                        </option>
                    </select>


                </td>
                <td>
                    <input type="date" th:field="*{details[__${iter.index}__].startDate}" required/>
                </td>
                <td>
                    <input type="date" th:field="*{details[__${iter.index}__].endDate}" required/>
                </td>
                <td>
                    <input type="number"
                           th:field="*{details[__${iter.index}__].noOfHrs}"
                           oninput="calcAmount(this)"
                           required/>
                </td>
                <td>
                    <input type="number"
                           step="0.01"
                           th:field="*{details[__${iter.index}__].rate}"
                           readonly/>
                </td>
                <td>
                    <input type="number"
                           step="0.01"
                           th:field="*{details[__${iter.index}__].amount}"
                           readonly/>
                </td>
                <td>
                    <button type="button" onclick="removeRow(this)">X</button>
                </td>
            </tr>
            </tbody>
        </table>

        <button type="button" onclick="addRow()">+ Add Line</button>
    </fieldset>

    <br/>
    <tfoot>
    <tr>
        <td colspan="5" style="text-align:right;"><strong>Total Amount:</strong></td>
        <td>
            <input type="number"
                   id="totalAmount"
                   class="form-control"
                   step="0.01"
                   readonly/>
        </td>
        <td></td>
    </tr>
    </tfoot>
    <button type="submit">Save Invoice</button>
</form>

<!-- ================= Employee Options Template ================= -->
<select id="employeeOptionsTemplate" style="display:none">
    <option value="">-- Select Employee --</option>
    <option th:each="e : ${employees}"
            th:value="${e.id}"
            th:data-rate="${e.invoiceRate}"
            th:text="${e.ledgerName}">
    </option>
</select>

<!-- ================= JavaScript ================= -->
<script>

    document.addEventListener("DOMContentLoaded", function () {
        // ✅ Recalculate amount for each existing row (edit mode)
        document.querySelectorAll("#lineItems tr").forEach(row => {
            const hrsInput = row.querySelector('input[name$=".noOfHrs"]');
            if (hrsInput) {
                calcAmount(hrsInput);
            }
        });

        // ✅ Ensure total is calculated on load
        updateTotal();
    });

    let rowIndex = 1;

    function addRow() {
        const tbody = document.getElementById("lineItems");

        // ✅ Always calculate the next index dynamically
        const index = tbody.querySelectorAll("tr").length;

        const row = document.createElement("tr");

        const employeeOptions =
            document.getElementById("employeeOptionsTemplate").innerHTML;

        row.innerHTML = `
        <td>
            <select name="details[${index}].employee"
                    onchange="onEmployeeChange(this)"
                    required>
                ${employeeOptions}
            </select>
        </td>
        <td>
            <input type="date"
                   name="details[${index}].startDate"
                   required/>
        </td>
        <td>
            <input type="date"
                   name="details[${index}].endDate"
                   required/>
        </td>
        <td>
            <input type="number"
                   name="details[${index}].noOfHrs"
                   oninput="calcAmount(this)"
                   required/>
        </td>
        <td>
            <input type="number"
                   step="0.01"
                   name="details[${index}].rate"
                   readonly/>
        </td>
        <td>
            <input type="number"
                   step="0.01"
                   name="details[${index}].amount"
                   readonly/>
        </td>
        <td>
            <button type="button"
                    onclick="removeRow(this)">
                X
            </button>
        </td>
    `;

        tbody.appendChild(row);
    }

    function removeRow(btn) {
        btn.closest("tr").remove();
    }

    function onEmployeeChange(select) {
        const row = select.closest("tr");
        const option = select.options[select.selectedIndex];
        const rate = option.dataset.rate || 0;

        row.querySelector('input[name$=".rate"]').value = rate;
        calcAmount(select);
    }

    function calcAmount(elem) {
        const row = elem.closest("tr");
        const hrs =
            parseFloat(row.querySelector('input[name$=".noOfHrs"]').value) || 0;
        const rate =
            parseFloat(row.querySelector('input[name$=".rate"]').value) || 0;

        row.querySelector('input[name$=".amount"]').value =
            (hrs * rate).toFixed(2);

        updateTotal();
    }

    function updateTotal() {
        let total = 0;
        document
            .querySelectorAll('input[name$=".amount"]')
            .forEach(input => {
                total += parseFloat(input.value) || 0;
            });

        document.getElementById("totalAmount").value =
            total.toFixed(2);
    }

</script>



</body>
</html>
