<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home Page</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
          integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <div th:replace="fragments/header :: header"></div>


    </div>
</nav>




<div class="container">
    <div class="row  justify-content-center">
        <div class="col-md-6 col-md-offset-3">

            <h1>Add Employee</h1>

            <!--Successful Registration-->
            <div th:if="${param.success}">
                <div class="alert alert-info">
                    You have successfully registered!
                </div>
            </div>

            <form th:action="@{/api/v1/employees/add}" method="post" >
                <div class="form-group">
                    <label class="control-label" for="firstName">
                        First Name
                    </label>
                    <input id="firstName" class="form-control" th:field="*{employee.firstName}" required autofocus="autofocus">
                </div>

                <div class="form-group">
                    <label class="control-label" for="lastName">
                        Last Name
                    </label>
                    <input id="lastName" class="form-control" th:field="*{employee.lastName}" required autofocus="autofocus">
                </div>

                <div class="form-group">
                    <label class="control-label" for="email">
                        Email
                    </label>
                    <input id="email" class="form-control" th:field="*{employee.email}" required autofocus="autofocus">
                </div>

                <div class="form-group">
                    <label class="control-label" for="config">
                        Config
                    </label>
                        <textarea  id="config" class="form-control" th:field="*{employee.config}" required autofocus="autofocus"rows="4" cols="30"></textarea>
                </div>

                <div class="form-group">
                    <label class="control-label" for="enable">
                        Enable Flag
                    </label>
                    <select id="enable" class="form-control" th:field="*{employee.enable}"  required autofocus="autofocus">

                    <option value="Y">Yes</option>
                    <option value="N">No</option>
                    </select>

                </div>

                <div class="form-group">
                    <button type="submit" class="btn btn-success">Submit</button>
                </div>
            </form>
        </div>
    </div>
</div>



</body>
</html>
