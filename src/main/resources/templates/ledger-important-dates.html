<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ledger Important Dates</title>

    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <div th:replace="fragments/header :: header"></div>


    </div>
</nav>

<nav class="navbar navbar-light bg-light">
    <div class="container">
        <h4 class="navbar-brand mb-0">
            Important Dates – <span th:text="${ledger.ledgerName}"></span>
        </h4>
    </div>
</nav>

<div class="container mt-4">

    <!-- ================= ADD FORM ================= -->
    <div class="card mb-4">
        <div class="card-header font-weight-bold">
            Add Important Date
        </div>
        <div class="card-body">


            <div class="form-row">
                <div class="form-group col-md-3">
                    <label>Date</label>
                    <input type="date"
                           class="form-control"
                           name="importantDate"
                           required>
                </div>

                <div class="form-group col-md-5">
                    <label>Description</label>
                    <input type="text"
                           class="form-control"
                           name="description"
                           placeholder="e.g. Contract Expiry"
                           required>
                </div>

                <div class="form-group col-md-3">
                    <label>Type</label>
                    <input type="text"
                           class="form-control"
                           name="type"
                           placeholder="CONTRACT / RENEWAL">
                </div>

                <div class="form-group col-md-1 d-flex align-items-end">
                    <button class="btn btn-primary btn-block">
                        Add
                    </button>
                </div>
            </div>

            </form>
        </div>
    </div>

    <!-- ================= LIST ================= -->
    <table class="table table-bordered table-hover">
        <thead class="thead-light">
        <tr>
            <th style="width: 120px;">Date</th>
            <th>Description</th>
            <th style="width: 140px;">Type</th>
            <th style="width: 100px;">Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="d : ${importantDates}">
            <td th:text="${d.importantDate}"></td>
            <td th:text="${d.description}"></td>
            <td th:text="${d.type}"></td>
            <td class="text-center">

                <form th:action="@{/api/v1/ledger/{lId}/important-dates/delete/{dId}
                                  (lId=${ledger.id}, dId=${d.id})}"
                      method="post"
                onclick="return confirm('Remove this important date?')">
                Remove
                </button>

                </form>

            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(importantDates)}">
            <td colspan="4" class="text-center text-muted">
                No important dates configured.
            </td>
        </tr>

        </tbody>
    </table>
    <a href="/api/v1/ledger/list">Back to Ledger List</a>

</div>

</body>
</html>
