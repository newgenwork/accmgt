<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Invoice</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
          integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <div th:replace="fragments/header :: header"></div>


    </div>
</nav>


<h2>Add Invoice</h2>

<form th:action="@{/api/v1/invoicesMaster/add}"
      th:object="${invoiceMaster}">

    <!-- ================= Invoice Header ================= -->
    <fieldset>
        <legend>Invoice Header</legend>

        <label>Reference:</label>
        <input type="text" th:field="*{reference}" required/>
        <br/><br/>

        <label>Invoice Date:</label>
        <input type="date" th:field="*{invoiceDate}" required/>
        <br/><br/>

        <label>Client:</label>
        <select th:field="*{client}" required>
            <option value="">-- Select Client --</option>
            <option th:each="c : ${clients}"
                    th:value="${c}"
                    th:text="${c.ledgerName}">
            </option>
        </select>

        <input type="hidden" th:field="*{status}" value="DRAFT"/>
    </fieldset>

    <br/>

    <!-- ================= Invoice Lines ================= -->
    <fieldset>
        <legend>Invoice Lines</legend>

        <table>
            <thead>
            <tr>
                <th>Employee</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Hours</th>
                <th>Invoice Rate</th>
                <th>Amount</th>
                <th></th>
            </tr>
            </thead>

            <tbody id="lineItems">
            <tr>
                <td>
                    <select name="details[0].employee"
                            onchange="onEmployeeChange(this)"
                            required>
                        <option value="">-- Select Employee --</option>
                        <option th:each="e : ${employees}"
                                th:value="${e}"
                                th:data-rate="${e.invoiceRate}"
                                th:text="${e.ledgerName}">
                        </option>
                    </select>
                </td>
                <td>
                    <input type="date" name="details[0].startDate" required/>
                </td>
                <td>
                    <input type="date" name="details[0].endDate" required/>
                </td>
                <td>
                    <input type="number"
                           name="details[0].noOfHrs"
                           oninput="calcAmount(this)"
                           required/>
                </td>
                <td>
                    <input type="number"
                           step="0.01"
                           name="details[0].rate"
                           readonly/>
                </td>
                <td>
                    <input type="number"
                           step="0.01"
                           name="details[0].amount"
                           readonly/>
                </td>
                <td>
                    <button type="button" onclick="removeRow(this)">X</button>
                </td>
            </tr>
            </tbody>
        </table>

        <button type="button" onclick="addRow()">+ Add Line</button>
    </fieldset>

    <br/>
    <button type="submit">Save Invoice</button>
</form>

<!-- ================= Employee Options Template ================= -->
<select id="employeeOptionsTemplate" style="display:none">
    <option value="">-- Select Employee --</option>
    <option th:each="e : ${employees}"
            th:value="${e}"
            th:data-rate="${e.invoiceRate}"
            th:text="${e.ledgerName}">
    </option>
</select>

<!-- ================= JavaScript ================= -->
<script>
    let rowIndex = 1;

    function addRow() {
        const tbody = document.getElementById("lineItems");
        const row = document.createElement("tr");

        const employeeOptions =
            document.getElementById("employeeOptionsTemplate").innerHTML;

        row.innerHTML = `
            <td>
                <select name="details[${rowIndex}].employee"
                        onchange="onEmployeeChange(this)"
                        required>
                    ${employeeOptions}
                </select>
            </td>
            <td><input type="date" name="details[${rowIndex}].startDate" required/></td>
            <td><input type="date" name="details[${rowIndex}].endDate" required/></td>
            <td>
                <input type="number"
                       name="details[${rowIndex}].noOfHrs"
                       oninput="calcAmount(this)"
                       required/>
            </td>
            <td>
                <input type="number"
                       step="0.01"
                       name="details[${rowIndex}].rate"
                       readonly/>
            </td>
            <td>
                <input type="number"
                       step="0.01"
                       name="details[${rowIndex}].amount"
                       readonly/>
            </td>
            <td>
                <button type="button" onclick="removeRow(this)">X</button>
            </td>
        `;

        tbody.appendChild(row);
        rowIndex++;
    }

    function removeRow(btn) {
        btn.closest("tr").remove();
    }

    function onEmployeeChange(select) {
        const row = select.closest("tr");
        const option = select.options[select.selectedIndex];
        const rate = option.dataset.rate || 0;

        row.querySelector('input[name$=".rate"]').value = rate;
        calcAmount(select);
    }

    function calcAmount(elem) {
        const row = elem.closest("tr");
        const hrs =
            parseFloat(row.querySelector('input[name$=".noOfHrs"]').value) || 0;
        const rate =
            parseFloat(row.querySelector('input[name$=".rate"]').value) || 0;

        row.querySelector('input[name$=".amount"]').value =
            (hrs * rate).toFixed(2);
    }
</script>

</body>
</html>
