<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ledger Important Dates</title>

    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <div th:replace="fragments/header :: header"></div>


    </div>
</nav>

<nav class="navbar navbar-light bg-light">
    <div class="container">
        <h4 class="navbar-brand mb-0">
            Documents – <span th:text="${ledger.ledgerName}"></span>
        </h4>
    </div>
</nav>

<div class="container mt-4">

    <!-- ================= ADD FORM ================= -->
    <div class="card mb-4">
        <div class="card-header font-weight-bold">
            Add Important Date
        </div>
        <div class="card-body">
            <form th:action="@{/api/v1/ledger/{id}/documents/add(id=${ledger.id})}"
                  method="post"
                  enctype="multipart/form-data"
                  th:value="${_csrf.token}" />

            <div class="form-row">

                <div class="form-group col-md-3">
                    <label>Expiry Date</label>
                    <input type="date"
                           class="form-control"
                           name="expiryDate"
                           required />
                </div>

                <div class="form-group col-md-3">
                    <label>Description</label>
                    <input type="text"
                           class="form-control"
                           name="description"
                           required />
                </div>

                <div class="form-group col-md-3">
                    <label>Document Link</label>
                    <input type="text"
                           class="form-control"
                           name="documentLink"
                            />
                </div>


                <div class="form-group col-md-2">
                    <label>Type</label>
                    <input type="text"
                           class="form-control"
                           name="type"
                           placeholder="CONTRACT" />
                </div>

                <div class="form-group col-md-3">
                    <label>Upload File</label>
                    <input type="file"
                           class="form-control"
                           name="file"
                            />
                </div>

                <div class="form-group col-md-1 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary btn-block">
                        Add
                    </button>
                </div>

            </div>
            </form>
        </div>
    </div>

    <!-- ================= LIST ================= -->




    <table class="table table-bordered table-hover mt-4">
        <thead class="thead-light">
        <tr>
            <th>Created Date</th>

            <th>Expiry Date</th>
            <th>Description</th>

            <th>Type</th>
            <th>Document Link</th>
            <th style="width: 220px;">Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="d : ${documents}">

            <td th:text="${#temporals.format(d.createdDate, 'MM-dd-yyyy')}"></td>
            <td th:text="${#temporals.format(d.expiryDate, 'MM-dd-yyyy')}"></td>
            <td th:text="${d.description}"></td>
            <td th:text="${d.type}"></td>
            <td th:text="${d.documentLink}"></td>
            <td class="text-center">

                <!-- DOWNLOAD -->
                <table>
                    <tr>
                    <td>




                        <form th:if="${d.isHasFile()}"
                              th:action="@{/api/v1/ledger/documents/download/{id}(id=${d.id})}"
                              method="GET"
                              style="displaymeterName}"
                              th:value="${_csrf.token}" />

                        <!--button type="submit"
                                class="btn btn-sm btn-success">
                            Download
                        </button-->


                        <button type="submit"
                                class="btn btn-sm"
                                th:classappend="${d.hasFile} ? 'btn-success' : 'btn-secondary'"
                                th:text="${d.hasFile} ? 'Download' : 'No File'"
                                th:disabled="${!d.hasFile}">
                        </button>






                        </form>
                    </td>
                    <td>

                        <form th:action="@{/api/v1/ledger/{lId}/documents/delete/{dId} (lId=${ledger.id}, dId=${d.id})}" method="post">
                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}" />



                            <button type="submit"
                                    class="btn btn-sm btn-danger"
                                    onclick="return confirm('Remove this important date?')">
                                Remove
                            </button>

                        </form>

                    </td>
                    </tr>
                </table>






            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(documents)}">
            <td colspan="4" class="text-center text-muted">
                No documents uploaded.
            </td>
        </tr>

        </tbody>
    </table>
    <a th:href="${ledgerListEndpoint}">Back to Ledger List</a>

</div>

</body>
</html>
